name: Terraform — Destroy n8n Infrastructure

on:
  # Manual trigger only — destroy should never run automatically
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm you want to destroy all n8n infrastructure'
        required: true

permissions:
  contents: read

env:
  TF_VERSION: "1.8.5"
  WORKING_DIR: "./terraform"
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  ARM_ACCESS_KEY:      ${{ secrets.ARM_ACCESS_KEY }}

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    # Only proceed if the user typed "destroy" in the confirmation input
    if: github.event.inputs.confirm == 'destroy'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        env:
          TF_VAR_n8n_encryption_key:    ${{ secrets.N8N_ENCRYPTION_KEY }}
          TF_VAR_custom_hostname:       ${{ secrets.N8N_HOSTNAME }}
          TF_VAR_home_ip:               ${{ secrets.HOME_IP }}
          TF_VAR_budget_alert_email:    ${{ secrets.BUDGET_ALERT_EMAIL }}
        run: terraform destroy -auto-approve