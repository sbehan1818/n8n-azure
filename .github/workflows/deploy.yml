name: Terraform — n8n Azure Deployment

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.8.5"
  WORKING_DIR: "./terraform"
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  ARM_ACCESS_KEY:      ${{ secrets.ARM_ACCESS_KEY }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_n8n_encryption_key:    ${{ secrets.N8N_ENCRYPTION_KEY }}
          TF_VAR_custom_hostname:       ${{ secrets.N8N_HOSTNAME }}
          TF_VAR_home_ip:               ${{ secrets.HOME_IP }}
          TF_VAR_budget_alert_email:    ${{ secrets.BUDGET_ALERT_EMAIL }}
        run: |
          terraform plan -no-color 2>&1 | tee plan_output.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          TF_VAR_n8n_encryption_key:    ${{ secrets.N8N_ENCRYPTION_KEY }}
          TF_VAR_custom_hostname:       ${{ secrets.N8N_HOSTNAME }}
          TF_VAR_home_ip:               ${{ secrets.HOME_IP }}
          TF_VAR_budget_alert_email:    ${{ secrets.BUDGET_ALERT_EMAIL }}
        run: terraform apply -auto-approve